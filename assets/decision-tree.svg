<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 452" font-family="Inter, -apple-system, Segoe UI, Roboto, sans-serif" role="img" aria-label="Decision rule: which level to reach for">
  <text x="6" y="22" fill="#22d3ee" font-family="JetBrains Mono, monospace" font-size="12" letter-spacing="2">DECISION RULE — NOTICE, THEN ADD</text>

  <g>
    <text x="12" y="94" fill="#8b7bff" font-size="42" font-weight="800" opacity=".85">1</text>
    <text x="78" y="80" fill="#f4f7fc" font-size="17" font-weight="700">One-off task, no conventions needed?</text>
    <text x="78" y="104" fill="#22d3ee" font-size="14.5">→ Level 1 · Raw prompting</text>
    <line x1="12" y1="120" x2="708" y2="120" stroke="rgba(255,255,255,.09)"/>
  </g>
  <g>
    <text x="12" y="172" fill="#8b7bff" font-size="42" font-weight="800" opacity=".85">2</text>
    <text x="78" y="158" fill="#f4f7fc" font-size="17" font-weight="700">Recurring work, same patterns and facts?</text>
    <text x="78" y="182" fill="#22d3ee" font-size="14.5">→ Level 2 · CLAUDE.md + rules + memory</text>
    <line x1="12" y1="198" x2="708" y2="198" stroke="rgba(255,255,255,.09)"/>
  </g>
  <g>
    <text x="12" y="250" fill="#8b7bff" font-size="42" font-weight="800" opacity=".85">3</text>
    <text x="78" y="236" fill="#f4f7fc" font-size="17" font-weight="700">A workflow you re-explain every single run?</text>
    <text x="78" y="260" fill="#22d3ee" font-size="14.5">→ Level 3 · Skills</text>
    <line x1="12" y1="276" x2="708" y2="276" stroke="rgba(255,255,255,.09)"/>
  </g>
  <g>
    <text x="12" y="328" fill="#8b7bff" font-size="42" font-weight="800" opacity=".85">4</text>
    <text x="78" y="314" fill="#f4f7fc" font-size="17" font-weight="700">A rule that needs enforcement, not guidance?</text>
    <text x="78" y="338" fill="#22d3ee" font-size="14.5">→ Level 4 · Hooks</text>
    <line x1="12" y1="354" x2="708" y2="354" stroke="rgba(255,255,255,.09)"/>
  </g>
  <g>
    <text x="12" y="406" fill="#8b7bff" font-size="42" font-weight="800" opacity=".85">5</text>
    <text x="78" y="392" fill="#f4f7fc" font-size="17" font-weight="700">A project that outgrows one context window?</text>
    <text x="78" y="416" fill="#22d3ee" font-size="14.5">→ Level 5 · Orchestration</text>
  </g>
</svg>
