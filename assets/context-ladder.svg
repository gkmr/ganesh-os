<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 564" font-family="Inter, -apple-system, Segoe UI, Roboto, sans-serif" role="img" aria-label="The context ladder: L1 raw prompting up to L5 orchestration, plus MCP">
  <defs>
    <linearGradient id="badge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8b7bff"/><stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <marker id="up" markerWidth="10" markerHeight="10" refX="5" refY="2" orient="auto">
      <path d="M0,8 L5,0 L10,8" fill="none" stroke="#8b7bff" stroke-width="1.6"/>
    </marker>
  </defs>
  <text x="6" y="20" fill="#22d3ee" font-family="JetBrains Mono, monospace" font-size="12" letter-spacing="2">THE CONTEXT LADDER</text>
  <line x1="26" y1="430" x2="26" y2="60" stroke="#8b7bff" stroke-width="2" marker-end="url(#up)" opacity=".8"/>

  <!-- L5 -->
  <g>
    <rect x="56" y="40" width="648" height="70" rx="14" fill="#111829" stroke="rgba(255,255,255,.10)"/>
    <rect x="72" y="55" width="40" height="40" rx="10" fill="url(#badge)"/>
    <text x="92" y="81" text-anchor="middle" fill="#0b0f1c" font-weight="800" font-size="16">L5</text>
    <text x="128" y="70" fill="#f4f7fc" font-weight="700" font-size="18">Orchestration</text>
    <text x="128" y="92" fill="#8995ad" font-size="13">Subagents in isolated context, when the job outgrows one window</text>
  </g>
  <!-- L4 -->
  <g>
    <rect x="56" y="118" width="648" height="70" rx="14" fill="#111829" stroke="rgba(255,255,255,.10)"/>
    <rect x="72" y="133" width="40" height="40" rx="10" fill="url(#badge)"/>
    <text x="92" y="159" text-anchor="middle" fill="#0b0f1c" font-weight="800" font-size="16">L4</text>
    <text x="128" y="148" fill="#f4f7fc" font-weight="700" font-size="18">Hooks</text>
    <text x="128" y="170" fill="#8995ad" font-size="13">Determinism outside the model loop. Zero context, every time. Enforcement.</text>
  </g>
  <!-- L3 -->
  <g>
    <rect x="56" y="196" width="648" height="70" rx="14" fill="#111829" stroke="rgba(255,255,255,.10)"/>
    <rect x="72" y="211" width="40" height="40" rx="10" fill="url(#badge)"/>
    <text x="92" y="237" text-anchor="middle" fill="#0b0f1c" font-weight="800" font-size="16">L3</text>
    <text x="128" y="226" fill="#f4f7fc" font-weight="700" font-size="18">Skills</text>
    <text x="128" y="248" fill="#8995ad" font-size="13">A saved workflow. Description always loaded, the body only on use.</text>
  </g>
  <!-- L2 -->
  <g>
    <rect x="56" y="274" width="648" height="70" rx="14" fill="#111829" stroke="rgba(255,255,255,.10)"/>
    <rect x="72" y="289" width="40" height="40" rx="10" fill="url(#badge)"/>
    <text x="92" y="315" text-anchor="middle" fill="#0b0f1c" font-weight="800" font-size="16">L2</text>
    <text x="128" y="304" fill="#f4f7fc" font-weight="700" font-size="18">CLAUDE.md + rules + memory</text>
    <text x="128" y="326" fill="#8995ad" font-size="13">Always-true facts persisted; rules load only on a path match.</text>
  </g>
  <!-- L1 -->
  <g>
    <rect x="56" y="352" width="648" height="70" rx="14" fill="#111829" stroke="rgba(255,255,255,.10)"/>
    <rect x="72" y="367" width="40" height="40" rx="10" fill="url(#badge)"/>
    <text x="92" y="393" text-anchor="middle" fill="#0b0f1c" font-weight="800" font-size="16">L1</text>
    <text x="128" y="382" fill="#f4f7fc" font-weight="700" font-size="18">Raw prompting</text>
    <text x="128" y="404" fill="#8995ad" font-size="13">One-off work that lives and dies in a single run.</text>
  </g>
  <!-- MCP band -->
  <g>
    <rect x="56" y="446" width="648" height="62" rx="14" fill="rgba(34,211,238,.06)" stroke="rgba(34,211,238,.35)" stroke-dasharray="5 5"/>
    <text x="80" y="475" fill="#22d3ee" font-weight="800" font-size="17">MCP</text>
    <text x="80" y="496" fill="#c4cde0" font-size="13">The connection layer, not a rung: reach what local files can't. Tool names always, schemas on demand.</text>
  </g>
  <text x="56" y="540" fill="#8995ad" font-size="12.5" font-style="italic">Climb a rung only when a specific friction forces you to. The hardest part is the judgment of what belongs where.</text>
</svg>
