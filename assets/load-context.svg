<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 392" font-family="Inter, -apple-system, Segoe UI, Roboto, sans-serif" role="img" aria-label="When each feature loads into the context window">
  <defs>
    <linearGradient id="g2" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#8b7bff"/><stop offset="1" stop-color="#22d3ee"/></linearGradient>
  </defs>
  <text x="6" y="20" fill="#22d3ee" font-family="JetBrains Mono, monospace" font-size="12" letter-spacing="2">WHEN CONTEXT LOADS</text>

  <!-- column headers -->
  <text x="20" y="52" fill="#f4f7fc" font-size="14" font-weight="700">Session start · always in</text>
  <text x="262" y="52" fill="#f4f7fc" font-size="14" font-weight="700">On use · loads when invoked</text>
  <text x="504" y="52" fill="#f4f7fc" font-size="14" font-weight="700">Isolated · zero main-context</text>

  <!-- col 1: session start -->
  <g>
    <rect x="14" y="64" width="222" height="64" rx="12" fill="#111829" stroke="rgba(255,255,255,.10)"/>
    <text x="30" y="92" fill="#f4f7fc" font-weight="700" font-size="14.5">CLAUDE.md</text>
    <text x="30" y="112" fill="#8995ad" font-size="12">Full content, every run. Keep it lean.</text>
    <rect x="14" y="138" width="222" height="64" rx="12" fill="#111829" stroke="rgba(255,255,255,.10)"/>
    <text x="30" y="166" fill="#f4f7fc" font-weight="700" font-size="14.5">MCP servers</text>
    <text x="30" y="186" fill="#8995ad" font-size="12">Tool names only; schemas on demand.</text>
    <rect x="14" y="212" width="222" height="64" rx="12" fill="#111829" stroke="rgba(255,255,255,.10)"/>
    <text x="30" y="240" fill="#f4f7fc" font-weight="700" font-size="14.5">Rules + skill descriptions</text>
    <text x="30" y="260" fill="#8995ad" font-size="12">Rules on path match; skill blurbs always.</text>
  </g>

  <!-- col 2: on use -->
  <g>
    <rect x="256" y="64" width="222" height="138" rx="12" fill="rgba(93,255,155,.05)" stroke="rgba(93,255,155,.30)" stroke-dasharray="5 5"/>
    <rect x="272" y="84" width="34" height="34" rx="9" fill="url(#g2)"/>
    <text x="289" y="107" text-anchor="middle" fill="#0b0f1c" font-weight="800" font-size="14">S</text>
    <text x="272" y="142" fill="#f4f7fc" font-weight="700" font-size="14.5">Skills (full body)</text>
    <text x="272" y="162" fill="#8995ad" font-size="12">The steps load only when the skill</text>
    <text x="272" y="178" fill="#8995ad" font-size="12">fires. Big library, lean window.</text>
  </g>

  <!-- col 3: isolated -->
  <g>
    <rect x="498" y="64" width="222" height="64" rx="12" fill="#0b0f1c" stroke="rgba(139,123,255,.40)"/>
    <text x="514" y="92" fill="#f4f7fc" font-weight="700" font-size="14.5">Subagents</text>
    <text x="514" y="112" fill="#8995ad" font-size="12">Fresh, isolated context. Report back.</text>
    <rect x="498" y="138" width="222" height="64" rx="12" fill="#0b0f1c" stroke="rgba(34,211,238,.40)"/>
    <text x="514" y="166" fill="#f4f7fc" font-weight="700" font-size="14.5">Hooks</text>
    <text x="514" y="186" fill="#8995ad" font-size="12">Run outside the loop. Zero cost.</text>
  </g>

  <!-- ganesh-os mapping footnote -->
  <line x1="14" y1="300" x2="706" y2="300" stroke="rgba(255,255,255,.09)"/>
  <text x="14" y="328" fill="#22d3ee" font-family="JetBrains Mono, monospace" font-size="11.5" letter-spacing="1">IN THIS SYSTEM</text>
  <text x="14" y="352" fill="#c4cde0" font-size="13">A read-first index stands in for the always-loaded file; each agent is a skill; the gather/reconcile/final-check</text>
  <text x="14" y="372" fill="#c4cde0" font-size="13">waves run as isolated subagents; the lane and alarm fences run as hooks, outside any model run.</text>
</svg>
