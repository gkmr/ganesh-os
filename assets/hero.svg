<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="440" viewBox="0 0 1280 440" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1020"/>
      <stop offset="1" stop-color="#1a1240"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.82" cy="0.1" r="0.6">
      <stop offset="0" stop-color="#7c5cff" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#7c5cff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="mark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7c5cff"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="440" fill="url(#bg)"/>
  <rect width="1280" height="440" fill="url(#glow)"/>

  <!-- wordmark -->
  <g transform="translate(64,58)">
    <rect width="30" height="30" rx="9" fill="url(#mark)"/>
    <text x="44" y="22" fill="#ffffff" font-size="21" font-weight="800" letter-spacing="-0.3">Ganesh OS</text>
  </g>

  <!-- headline -->
  <text x="64" y="170" fill="#ffffff" font-size="52" font-weight="800" letter-spacing="-1.4">Autonomous agents, made safe to run unattended.</text>
  <text x="64" y="214" fill="#c7cfe0" font-size="22" font-weight="500">27 scheduled AI agents. One rule keeps them safe:</text>
  <text x="64" y="246" fill="#ffffff" font-size="22" font-weight="800">every field has exactly one owner.</text>

  <!-- lanes -->
  <g transform="translate(64,290)" font-size="13" font-weight="600">
    <g transform="translate(0,0)">
      <text x="0" y="11" fill="#8b97b0" text-anchor="start">priority</text>
      <rect x="92" y="2" width="980" height="10" rx="5" fill="#ffffff" opacity="0.06"/>
      <rect x="92" y="2" width="300" height="10" rx="5" fill="#7c5cff"/>
    </g>
    <g transform="translate(0,26)">
      <text x="0" y="11" fill="#8b97b0">dates</text>
      <rect x="92" y="2" width="980" height="10" rx="5" fill="#ffffff" opacity="0.06"/>
      <rect x="430" y="2" width="320" height="10" rx="5" fill="#22c55e"/>
    </g>
    <g transform="translate(0,52)">
      <text x="0" y="11" fill="#8b97b0">lifecycle</text>
      <rect x="92" y="2" width="980" height="10" rx="5" fill="#ffffff" opacity="0.06"/>
      <rect x="250" y="2" width="220" height="10" rx="5" fill="#22d3ee"/>
    </g>
    <g transform="translate(0,78)">
      <text x="0" y="11" fill="#8b97b0">new opportunities</text>
      <rect x="92" y="2" width="980" height="10" rx="5" fill="#ffffff" opacity="0.06"/>
      <rect x="760" y="2" width="180" height="10" rx="5" fill="#a78bfa"/>
    </g>
  </g>

  <!-- stat chips -->
  <g transform="translate(64,400)" font-size="15">
    <text x="0" y="0" fill="#ffffff" font-weight="800">99 → 0</text>
    <text x="64" y="0" fill="#8b97b0">overdue, held automatically</text>
    <text x="330" y="0" fill="#ffffff" font-weight="800">286</text>
    <text x="368" y="0" fill="#8b97b0">items triaged under a daily budget</text>
    <text x="690" y="0" fill="#ffffff" font-weight="800">0</text>
    <text x="708" y="0" fill="#8b97b0">cross-lane writes, enforced by an eval</text>
  </g>
</svg>
