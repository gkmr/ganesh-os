<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body{margin:0;background:var(--bg);font-family:var(--font-sans);padding:24px;color:var(--body)}
  .sec{margin-bottom:22px}
  .lbl{font:700 11px/1 var(--font-mono);text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:12px}
  .panel{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-xl);padding:18px 22px}
  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
  .two{display:grid;grid-template-columns:1fr 1fr;gap:16px;align-items:start}
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { DomainLane, StatTile, ChangeLogLine, CodeBlock, Cg, Cc } = window.GaneshOSDesignSystem_462320;
  function Demo(){
    return (
      <div>
        <div className="sec">
          <div className="lbl">DomainLane — four domains, one too loud</div>
          <div className="panel">
            <DomainLane name="Work / company" sub="build, GTM, capital" domain="work" count="48 today" />
            <DomainLane name="Health" sub="lift, cardio, PT" domain="health" count="11d since PT" quiet delay={0.6} />
            <DomainLane name="People" sub="date night, family" domain="people" count="3 owed" quiet delay={1.1} />
            <DomainLane name="Growth" sub="panels, mentoring" domain="growth" count="on hold" quiet delay={1.6} />
          </div>
        </div>
        <div className="sec">
          <div className="lbl">StatTile</div>
          <div className="stats">
            <StatTile value="99 → 0" label="overdue, held at zero" />
            <StatTile value="27" label="coordinated agents" />
            <StatTile value="1 rule" label="every field, one owner" />
            <StatTile value="0" label="cross-lane writes, in CI" />
          </div>
        </div>
        <div className="two">
          <div className="sec">
            <div className="lbl">ChangeLogLine</div>
            <ChangeLogLine time="05:48" agent="pipeline-triage" field="priority(J04)" />
            <ChangeLogLine time="06:04" agent="morning-sweep" field="due_date(M51)" note="# read-after-write ✓" />
            <ChangeLogLine time="14:02" agent="todo-triage" field="due_date(M51)" verdict="CROSS-LANE" blocked />
          </div>
          <div className="sec">
            <div className="lbl">CodeBlock</div>
            <CodeBlock title="change-log · today · verified in CI">
              <Cc># every write, one owner, source-tagged</Cc>{"\n"}
              <Cg>06:04</Cg>{"  morning-sweep   → due_date     OK"}{"\n"}
              <Cg>13:40</Cg>{"  reply-processor → lifecycle    OK"}{"\n"}
              <Cc>$ pytest evals/  →  </Cc><Cg>5 passed</Cg>
            </CodeBlock>
          </div>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body>
</html>
