<!-- @dsCard group="Components" viewport="700x420" name="Structure - Tabs · Table · Tooltip · Dialog · Toast" subtitle="Navigation, tabular data, and feedback primitives" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body{margin:0;background:var(--bg);font-family:var(--font-sans);padding:24px;color:var(--body)}
  .sec{margin-bottom:22px}
  .lbl{font:700 11px/1 var(--font-mono);text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:12px}
  .row{display:flex;gap:14px;flex-wrap:wrap;align-items:center}
  .two{display:grid;grid-template-columns:1.3fr 1fr;gap:20px;align-items:start}
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { Tabs, Table, Tooltip, Dialog, Toast, Button } = window.GaneshOSDesignSystem_462320;
  function Demo(){
    const [tab, setTab] = React.useState("agents");
    const [open, setOpen] = React.useState(false);
    return (
      <div>
        <div className="sec">
          <div className="lbl">Tabs</div>
          <Tabs tabs={["story","product","governance","agents"]} value={tab} onChange={setTab} />
        </div>
        <div className="two">
          <div className="sec">
            <div className="lbl">Table</div>
            <Table
              columns={[
                {key:"agent", header:"Agent"},
                {key:"owns", header:"Owns field", mono:true},
                {key:"runs", header:"Runs/day", align:"right", mono:true},
              ]}
              rows={[
                {agent:"morning-sweep", owns:"due_date", runs:1},
                {agent:"pipeline-triage", owns:"priority", runs:4},
                {agent:"reply-processor", owns:"lifecycle", runs:24},
              ]} />
          </div>
          <div className="sec">
            <div className="lbl">Tooltip · Dialog</div>
            <div className="row">
              <Tooltip content="Owned by the sweeps. Read-only to every other agent.">
                <span style={{borderBottom:'1px dotted var(--faint)', color:'var(--body)', cursor:'help', fontFamily:'var(--font-mono)', fontSize:13}}>due_date</span>
              </Tooltip>
              <Button variant="ghost" size="sm" onClick={()=>setOpen(true)}>Confirm prune</Button>
            </div>
            <Dialog open={open} onClose={()=>setOpen(false)} title="Confirm prune">
              <p style={{color:'var(--body)', margin:0, fontSize:14, lineHeight:1.55}}>Drop PR2 (stale lead, no longer active)? This is irreversible, so it needs you.</p>
              <div style={{display:'flex', gap:10, justifyContent:'flex-end', marginTop:18}}>
                <Button variant="ghost" size="sm" onClick={()=>setOpen(false)}>Keep</Button>
                <Button size="sm" onClick={()=>setOpen(false)}>Drop it</Button>
              </div>
            </Dialog>
          </div>
        </div>
        <div className="sec">
          <div className="lbl">Toast</div>
          <div className="row">
            <Toast tone="success" title="Decision applied" duration={0}>done M51, stamped 7:43. Re-mirrored.</Toast>
            <Toast tone="warn" title="Auto-parked 63 items" duration={0}>Overdue held at zero. Every move is logged.</Toast>
          </div>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body>
</html>
