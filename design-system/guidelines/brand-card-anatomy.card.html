<!-- @dsCard group="Brand" viewport="700x200" name="Card anatomy" subtitle="Hairline border, domain top-accent, glow on hover" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--bg);font-family:var(--font-sans);padding:22px;color:var(--body)}
  .row{display:flex;gap:16px;flex-wrap:wrap}
  .card{flex:1;min-width:180px;background:var(--surface);border:1px solid var(--line);border-radius:var(--r-xl);padding:18px;box-shadow:var(--shadow-sm)}
  .card.accent{border-top:2px solid var(--health)}
  .card.glow{box-shadow:var(--glow);border-color:transparent;transform:translateY(-3px)}
  .lt{font:var(--text-mono-label);text-transform:uppercase;letter-spacing:var(--ls-mono);color:var(--health)}
  .card h3{color:var(--ink);font-size:15.5px;margin:9px 0 5px}
  .card p{margin:0;font-size:13px;color:var(--muted)}
  .own{display:inline-block;margin-top:11px;font:500 11px/1 var(--font-mono);color:var(--body);background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:7px;padding:6px 8px}
  .tagrow{margin-top:8px;font-family:var(--font-mono);font-size:11px;color:var(--faint)}
</style>
</head>
<body>
  <div class="row">
    <div class="card">
      <h3 style="margin-top:0">Default card</h3>
      <p>Surface #111829, 1px hairline, radius 18, soft stacked shadow.</p>
      <div class="tagrow">--surface · --line · --shadow-sm</div>
    </div>
    <div class="card accent">
      <div class="lt">Health</div>
      <h3>Top-accent</h3>
      <p>2px domain-colored top border carries semantic meaning.</p>
      <span class="own">held: streak-aware</span>
    </div>
    <div class="card glow accent">
      <div class="lt">Health</div>
      <h3>Hover state</h3>
      <p>Lifts ~3px and gains the violet glow ring + bloom.</p>
      <div class="tagrow">--glow</div>
    </div>
  </div>
</body>
</html>
