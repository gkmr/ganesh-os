<!-- @dsCard group="Type" viewport="700x170" name="Mono labels & data" subtitle="JetBrains Mono for eyebrows, owner pills, timestamps" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--bg);font-family:var(--font-mono);padding:22px;color:var(--body)}
  .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:16px}
  .eyebrow{font:700 12.5px/1 var(--font-mono);color:var(--brand-2);text-transform:uppercase;letter-spacing:.05em}
  .pill{font:600 11px/1 var(--font-mono);color:var(--body);background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:var(--r-sm);padding:6px 9px}
  .tag{font:700 11px/1 var(--font-mono);color:var(--brand-2);background:rgba(34,211,238,.08);border:1px solid rgba(34,211,238,.25);border-radius:999px;padding:6px 11px}
  .stat{font-variant-numeric:tabular-nums;color:var(--ink);font-weight:800;font-size:30px}
  .log{font-size:12.5px;color:var(--body);background:#060a12;border:1px solid var(--line);border-radius:var(--r-md);padding:11px 13px;line-height:1.7}
  .log .g{color:var(--neon)}.log .c{color:#5b6b86}
</style>
</head>
<body>
  <div class="row">
    <span class="eyebrow">CASE 01 · GOVERNANCE</span>
    <span class="tag">▶ live</span>
    <span class="pill">owns: priority</span>
    <span class="stat">99→0</span>
  </div>
  <div class="log"><span class="g">06:04</span>&nbsp; morning-sweep &nbsp;→ due_date(M51) &nbsp;&nbsp;OK <span class="c"># read-after-write ✓</span></div>
</body>
</html>
