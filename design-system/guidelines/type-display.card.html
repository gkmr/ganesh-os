<!-- @dsCard group="Type" viewport="700x180" name="Display & title" subtitle="Inter 800–900, tight tracking, gradient text-fill" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--bg);font-family:var(--font-sans);padding:22px;color:var(--body)}
  .lab{font:var(--text-mono-label);color:var(--brand-2);text-transform:uppercase;letter-spacing:var(--ls-mono);margin-bottom:8px}
  .display{font-weight:900;font-size:clamp(30px,5vw,46px);line-height:1.03;letter-spacing:-.03em;
    background:var(--grad-ink);-webkit-background-clip:text;background-clip:text;color:transparent;margin:0 0 18px}
  .title{font-weight:800;font-size:28px;line-height:1.12;letter-spacing:-.022em;
    background:var(--grad-ink);-webkit-background-clip:text;background-clip:text;color:transparent;margin:0}
</style>
</head>
<body>
  <div class="lab">Display · --fs-display · 900</div>
  <h1 class="display">One loud domain was eating my whole life.</h1>
  <div class="lab">Title · --fs-title · 800</div>
  <h2 class="title">It doesn't run my tasks. It runs my life.</h2>
</body>
</html>
