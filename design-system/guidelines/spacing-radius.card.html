<!-- @dsCard group="Spacing" viewport="700x150" name="Radius scale" subtitle="8 → 22px, soft large corners" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--bg);font-family:var(--font-sans);padding:20px}
  .row{display:flex;gap:14px;flex-wrap:wrap;align-items:flex-end}
  .b{background:var(--grad-surface);border:1px solid var(--line-2);width:92px;height:74px;display:flex;flex-direction:column;justify-content:flex-end;padding:9px}
  .b .n{font:var(--text-mono-label);color:var(--brand-2)}
  .b .v{font-family:var(--font-mono);font-size:11px;color:var(--muted);margin-top:3px}
</style>
</head>
<body>
  <div class="row">
    <div class="b" style="border-radius:var(--r-sm)"><div class="n">sm</div><div class="v">8px</div></div>
    <div class="b" style="border-radius:var(--r-md)"><div class="n">md</div><div class="v">11px</div></div>
    <div class="b" style="border-radius:var(--r-lg)"><div class="n">lg</div><div class="v">14px</div></div>
    <div class="b" style="border-radius:var(--r-xl)"><div class="n">xl</div><div class="v">18px</div></div>
    <div class="b" style="border-radius:var(--r-2xl)"><div class="n">2xl</div><div class="v">22px</div></div>
    <div class="b" style="border-radius:var(--r-pill);width:120px"><div class="n">pill</div><div class="v">999px</div></div>
  </div>
</body>
</html>
