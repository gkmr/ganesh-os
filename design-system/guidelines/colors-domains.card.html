<!-- @dsCard group="Colors" viewport="700x150" name="Life domains" subtitle="Four semantic accents: work · health · people · growth" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--bg);font-family:var(--font-sans);padding:20px;color:var(--body)}
  .row{display:flex;gap:14px;flex-wrap:wrap}
  .d{flex:1;min-width:130px;background:var(--surface);border:1px solid var(--line);border-top:2px solid var(--c);border-radius:var(--r-lg);padding:14px;min-height:84px}
  .d .chip{width:11px;height:11px;border-radius:4px;background:var(--c);box-shadow:0 0 12px var(--c)}
  .d .t{color:#fff;font-weight:700;font-size:14px;margin:10px 0 3px}
  .d .lab{font:var(--text-mono-label);color:var(--muted)}
  .d .h{font-family:var(--font-mono);font-size:11px;color:var(--faint);margin-top:4px}
</style>
</head>
<body>
  <div class="row">
    <div class="d" style="--c:var(--work)"><div class="chip"></div><div class="t">Work</div><div class="lab">--work</div><div class="h">#fbbf24 · amber</div></div>
    <div class="d" style="--c:var(--health)"><div class="chip"></div><div class="t">Health</div><div class="lab">--health</div><div class="h">#2dd4bf · teal</div></div>
    <div class="d" style="--c:var(--people)"><div class="chip"></div><div class="t">People</div><div class="lab">--people</div><div class="h">#fb923c · orange</div></div>
    <div class="d" style="--c:var(--growth)"><div class="chip"></div><div class="t">Growth</div><div class="lab">--growth</div><div class="h">#a78bfa · violet</div></div>
  </div>
</body>
</html>
