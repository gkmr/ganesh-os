<!-- @startingPoint section="Screens" subtitle="Ganesh OS one-day digest (phone)" viewport="1000x900" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ganesh OS - one day</title>
<link rel="stylesheet" href="../../styles.css">
<style>
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--body);font-family:var(--font-sans);-webkit-font-smoothing:antialiased;overflow-x:hidden}
  .bgfx{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none}
  .orb{position:absolute;border-radius:50%;filter:blur(70px);opacity:.42}
  .o1{width:560px;height:560px;left:-160px;top:-120px;background:radial-gradient(circle,var(--orb-violet),transparent 65%)}
  .o2{width:520px;height:520px;right:-160px;top:240px;background:radial-gradient(circle,var(--orb-magenta),transparent 65%)}
  main{position:relative;z-index:2;max-width:760px;margin:0 auto;padding:46px 24px 80px;text-align:center}
  h1{font-size:clamp(26px,4vw,38px);font-weight:900;letter-spacing:-.03em;margin:0 0 10px;background:linear-gradient(180deg,#fff 30%,#aeb8d4);-webkit-background-clip:text;background-clip:text;color:transparent}
  .lede{color:var(--body);font-size:17px;max-width:54ch;margin:0 auto 30px}
  @media(prefers-reduced-motion:reduce){*{animation:none!important}}
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
</head>
<body>
<div class="bgfx"><span class="orb o1"></span><span class="orb o2"></span></div>
<main>
  <h1>One day, decided for you</h1>
  <p class="lede">At 7:42 your phone already knows what the day is for. Step through it: the overnight sweep, the morning brief, your one-word replies, the honest scorecard at night.</p>
  <div id="root"></div>
</main>

<script type="text/babel" src="OneDay.jsx"></script>
<script type="text/babel">
  ReactDOM.createRoot(document.getElementById('root')).render(<OneDay/>);
</script>
</body>
</html>
