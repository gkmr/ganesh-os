<!-- @startingPoint section="Screens" subtitle="Full Ganesh OS landing page recreation" viewport="1200x760" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ganesh OS — landing</title>
<link rel="stylesheet" href="../../styles.css">
<style>
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{margin:0;background:var(--bg);color:var(--body);font-family:var(--font-sans);font-size:17px;line-height:1.62;-webkit-font-smoothing:antialiased;overflow-x:hidden}
  a{color:var(--brand);text-decoration:none}
  /* parallax background field */
  .bgfx{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none}
  .bgfx .orb{position:absolute;border-radius:50%;filter:blur(70px);opacity:.5}
  .o1{width:620px;height:620px;left:-160px;top:-120px;background:radial-gradient(circle,var(--orb-violet),transparent 65%)}
  .o2{width:560px;height:560px;right:-140px;top:240px;background:radial-gradient(circle,var(--orb-teal),transparent 65%)}
  .o3{width:520px;height:520px;left:30%;top:1400px;background:radial-gradient(circle,var(--orb-magenta),transparent 65%)}
  .o4{width:600px;height:600px;right:5%;top:2600px;background:radial-gradient(circle,var(--orb-blue),transparent 65%)}
  .bgfx .grid{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px);background-size:48px 48px;mask-image:radial-gradient(ellipse at 50% 0%,#000,transparent 75%)}
  @media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
</head>
<body>
<div class="bgfx"><span class="orb o1"></span><span class="orb o2"></span><span class="orb o3"></span><span class="orb o4"></span><span class="grid"></span></div>
<div id="root"></div>

<script type="text/babel" src="Nav.jsx"></script>
<script type="text/babel" src="Hero.jsx"></script>
<script type="text/babel" src="Sections.jsx"></script>
<script type="text/babel">
  function App(){
    const [active, setActive] = React.useState("story");
    const onNav = (id) => {
      setActive(id);
      const el = document.getElementById(id) || (id === "top" && document.getElementById("top"));
      if (el) window.scrollTo({ top: id === "top" ? 0 : el.offsetTop - 70, behavior: "smooth" });
    };
    return (
      <React.Fragment>
        <Nav active={active} onNav={onNav} />
        <Hero onNav={onNav} />
        <PersonaRouter onNav={onNav} />
        <LifeGrid />
        <Governance />
        <AgentCatalog />
        <Footer />
      </React.Fragment>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
