<!-- @startingPoint section="Screens" subtitle="Ganesh OS operator dashboard" viewport="1200x800" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ganesh OS — operator</title>
<link rel="stylesheet" href="../../styles.css">
<style>
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--body);font-family:var(--font-sans);-webkit-font-smoothing:antialiased;overflow-x:hidden}
  .bgfx{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none}
  .orb{position:absolute;border-radius:50%;filter:blur(70px);opacity:.4}
  .o1{width:560px;height:560px;left:-160px;top:-120px;background:radial-gradient(circle,var(--orb-violet),transparent 65%)}
  .o2{width:520px;height:520px;right:-140px;top:160px;background:radial-gradient(circle,var(--orb-teal),transparent 65%)}
  .grid{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.02) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.02) 1px,transparent 1px);background-size:48px 48px;mask-image:radial-gradient(ellipse at 50% 0%,#000,transparent 75%)}
  main{position:relative;z-index:2;max-width:1180px;margin:0 auto;padding:24px 24px 80px}
  .cols{display:grid;grid-template-columns:1.15fr .85fr;gap:18px;align-items:start;margin-top:18px}
  .stack{display:flex;flex-direction:column;gap:18px}
  @media(max-width:900px){.cols{grid-template-columns:1fr}}
  @media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
</head>
<body>
<div class="bgfx"><span class="orb o1"></span><span class="orb o2"></span><span class="grid"></span></div>
<div id="root"></div>

<script type="text/babel" src="OpBar.jsx"></script>
<script type="text/babel" src="Panels.jsx"></script>
<script type="text/babel" src="DecisionQueue.jsx"></script>
<script type="text/babel">
  function App(){
    return (
      <React.Fragment>
        <OpBar />
        <main>
          <Metrics />
          <div className="cols">
            <div className="stack">
              <DomainBalance />
              <DecisionQueue />
              <FenceTable />
            </div>
            <div className="stack">
              <ChangeLog />
              <EvalGate />
            </div>
          </div>
        </main>
      </React.Fragment>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
