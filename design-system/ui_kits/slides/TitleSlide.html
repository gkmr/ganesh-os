<!-- @dsCard group="Slides" viewport="1280x720" name="Title slide" subtitle="Cover: kicker, gradient headline, lede, footer mark" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  html,body{margin:0}
  .slide{width:1280px;height:720px;position:relative;overflow:hidden;background:var(--bg);color:var(--body);font-family:var(--font-sans);padding:96px 110px;box-sizing:border-box;display:flex;flex-direction:column;justify-content:center}
  .orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:.5}
  .o1{width:620px;height:620px;left:-160px;top:-180px;background:radial-gradient(circle,var(--orb-violet),transparent 65%)}
  .o2{width:560px;height:560px;right:-150px;bottom:-200px;background:radial-gradient(circle,var(--orb-teal),transparent 65%)}
  .gridfx{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px);background-size:48px 48px;mask-image:radial-gradient(ellipse at 30% 30%,#000,transparent 75%)}
  .kicker{position:relative;display:inline-flex;align-items:center;gap:10px;font:600 16px/1 var(--font-sans);color:var(--brand-2);background:rgba(34,211,238,.08);border:1px solid rgba(34,211,238,.25);border-radius:999px;padding:9px 17px;width:max-content;margin-bottom:30px}
  .kicker .dot{width:8px;height:8px;border-radius:50%;background:var(--brand-2);box-shadow:0 0 10px var(--brand-2)}
  h1{position:relative;font-size:74px;line-height:1.02;font-weight:900;letter-spacing:-.03em;margin:0 0 26px;max-width:17ch;background:linear-gradient(180deg,#fff 35%,#aeb8d4);-webkit-background-clip:text;background-clip:text;color:transparent}
  .lede{position:relative;font-size:25px;line-height:1.5;color:var(--body);max-width:40ch;margin:0}
  .lede b{color:var(--ink)}
  .foot{position:absolute;left:110px;bottom:64px;display:flex;align-items:center;gap:12px}
  .foot .mark{width:30px;height:30px;border-radius:9px;background:var(--grad-mark);box-shadow:0 0 22px rgba(139,123,255,.6)}
  .foot b{color:var(--ink);font-weight:800;font-size:18px}
  .foot span{color:var(--faint);font-family:var(--font-mono);font-size:14px}
</style>
</head>
<body>
  <div class="slide">
    <span class="orb o1"></span><span class="orb o2"></span><span class="gridfx"></span>
    <span class="kicker"><span class="dot"></span>A personal AI operating system, run at the scale of one life</span>
    <h1>It doesn't run my tasks. It runs my life.</h1>
    <p class="lede"><b>Work shouts. Everything that matters whispers.</b> 30+ agents, governed by one rule, so nothing you love slips in silence.</p>
    <div class="foot"><span class="mark"></span><b>Ganesh OS</b><span>· governance for autonomous agents</span></div>
  </div>
</body>
</html>
